<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Dibee ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: #fff;
}

#countdownScreen {
  margin-top: 25%;
}

#mainContent {
  display: none;
  padding: 20px;
}

button {
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: white;
  color: #ff4b5c;
  cursor: pointer;
}

.message {
  font-size: 22px;
  margin: 20px;
  min-height: 50px;
}

img {
  width: 220px;
  border-radius: 15px;
  margin-top: 15px;
}

/* Confetti */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background: white;
  top: 0;
  animation: fall 5s linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
  }
}
</style>

</head>

<body>

<!-- Countdown Screen -->
<div id="countdownScreen">
  <h1>⏳ Something for you Dibee 😌</h1>
  <h2 id="timer"></h2>
</div>

<!-- Main Content -->
<div id="mainContent">
  <h1>🎉 Happy Birthday Dibee ❤️</h1>
  <p id="text" class="message"></p>

  <img id="slideshow" src="photo1.jpg">

  <video width="300" controls autoplay loop>
    <source src="yourvideo.mp4" type="video/mp4">
  </video>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// 🎯 Set target date (IMPORTANT)
const targetDate = new Date("April 26, 2026 00:00:00").getTime();

// Countdown
const timer = document.getElementById("timer");

setInterval(() => {
  const now = new Date().getTime();
  const diff = targetDate - now;

  if (diff <= 0) {
    document.getElementById("countdownScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";

    document.getElementById("music").play();
    createConfetti();
    typeEffect();
    setInterval(slideShow, 2000);
    return;
  }

  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);

  timer.innerHTML = `${hours}h ${minutes}m ${seconds}s`;
}, 1000);

// Messages
const messages = [
  "We met in MBA… just normal classmates at first 😌",
  "You teasing me with ‘Sentiment Analysis’…",
  "and me showing off my ‘Dashboard’ 😏",
  "Somewhere in between those random talks…",
  "you became my favorite person 🫶",
  "You're cute… pretty… and my little billo 🐾",
  "A wild cat… but still mine 😌❤️",
  "Annoying? Yes. Dramatic? 100%.",
  "But would I choose you again?",
  "Always.",
  "So today… just smile okay?",
  "Because it's your day Dibee 🎂✨",
  "Started with ‘Sentiment Analysis’ & ‘Dashboard’… ended up with my favorite person ❤️"
];

let i = 0;
let j = 0;

function typeEffect() {
  if (i < messages.length) {
    if (j < messages[i].length) {
      document.getElementById("text").innerHTML += messages[i].charAt(j);
      j++;
      setTimeout(typeEffect, 50);
    } else {
      document.getElementById("text").innerHTML += "<br><br>";
      i++;
      j = 0;
      setTimeout(typeEffect, 800);
    }
  }
}

// Slideshow
const photos = ["photo1.jpg","photo2.jpg","photo3.jpg"];
let p = 0;

function slideShow() {
  p = (p + 1) % photos.length;
  document.getElementById("slideshow").src = photos[p];
}

// Confetti
function createConfetti() {
  for (let i = 0; i < 60; i++) {
    let conf = document.createElement("div");
    conf.classList.add("confetti");
    conf.style.left = Math.random() * 100 + "vw";
    conf.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(conf);
  }
}
</script>

</body>
</html>
