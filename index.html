<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Dibee ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: black;
  color: white;
  overflow: hidden;
}

/* Intro */
#start {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* Button */
button {
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: #ff4b5c;
  color: white;
  cursor: pointer;
}

/* Main content */
#mainContent {
  display: none;
  padding: 20px;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  min-height: 100vh;
}

/* Heart */
.heart {
  position: relative;
  width: 120px;
  height: 120px;
  background: #ff4b5c;
  transform: rotate(-45deg);
  margin: 20px auto;
  animation: beat 1s infinite;
  display: flex;
  align-items: center;
  justify-content: center;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 120px;
  height: 120px;
  background: #ff4b5c;
  border-radius: 50%;
}

.heart::before { top: -60px; }
.heart::after { left: 60px; }

.heart span {
  transform: rotate(45deg);
  font-size: 18px;
  font-weight: bold;
}

/* Animations */
@keyframes beat {
  0%,100% { transform: scale(1) rotate(-45deg); }
  50% { transform: scale(1.2) rotate(-45deg); }
}

.message {
  font-size: 22px;
  margin: 20px;
  min-height: 60px;
}

/* Media */
img {
  width: 230px;
  border-radius: 15px;
  margin-top: 15px;
}

video {
  margin-top: 15px;
  border-radius: 15px;
}

/* Confetti */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background: white;
  top: 0;
  animation: fall 4s linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh) rotate(360deg); }
}
</style>
</head>

<body>

<!-- Start -->
<div id="start">
  <h1>🌙 Oye Billo… ready? 😌</h1>
  <button onclick="startSurprise()">Tap Slowly 💖</button>
</div>

<!-- Main -->
<div id="mainContent">
  <h1>🎉 Happy Birthday Dibee ❤️</h1>

  <div class="heart">
    <span id="countdown">00:00:00</span>
  </div>

  <p id="text" class="message"></p>

  <img id="slideshow" src="photo1.jpg">

  <video width="300" controls autoplay loop>
    <source src="yourvideo.mp4" type="video/mp4">
  </video>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// Messages
const messages = [
  "We met in MBA… just normal classmates 😌",
  "You teasing me with ‘Sentiment Analysis’…",
  "and me flexing my ‘Dashboard’ 😏",
  "Somewhere between all that…",
  "you became my favorite person 🫶",
  "My cute… dramatic… little billo 🐾",
  "A wild cat… but still mine 😌❤️",
  "Annoying? Yes. Worth it? Always.",
  "So today… just smile okay?",
  "Because it's your day Dibee 🎂✨"
];

let i = 0, j = 0;

// Typing
function typeEffect() {
  if (i < messages.length) {
    if (j < messages[i].length) {
      document.getElementById("text").innerHTML += messages[i].charAt(j);
      j++;
      setTimeout(typeEffect, 50);
    } else {
      document.getElementById("text").innerHTML += "<br><br>";
      i++; j = 0;
      setTimeout(typeEffect, 800);
    }
  }
}

// Slideshow
const photos = ["photo1.jpg","photo2.jpg","photo3.jpg"];
let p = 0;

function slideShow() {
  p = (p + 1) % photos.length;
  document.getElementById("slideshow").src = photos[p];
}

// Confetti
function createConfetti() {
  for (let i = 0; i < 80; i++) {
    let c = document.createElement("div");
    c.classList.add("confetti");
    c.style.left = Math.random() * 100 + "vw";
    c.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(c);
  }
}

// Countdown inside heart
function startCountdown() {
  const target = new Date("April 26, 2026 00:00:00").getTime();

  const timer = setInterval(() => {
    let now = new Date().getTime();
    let diff = target - now;

    if (diff <= 0) {
      clearInterval(timer);
      document.getElementById("countdown").innerHTML = "❤️";
      createConfetti();
      return;
    }

    let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    let m = Math.floor((diff%(1000*60*60))/(1000*60));
    let s = Math.floor((diff%(1000*60))/1000);

    document.getElementById("countdown").innerHTML =
      String(h).padStart(2,'0')+":"+
      String(m).padStart(2,'0')+":"+
      String(s).padStart(2,'0');
  },1000);
}

// Pre-lock countdown
function startPreCountdown(target) {
  const timer = setInterval(() => {
    const now = new Date().getTime();
    const diff = target - now;

    if (diff <= 0) {
      clearInterval(timer);
      document.getElementById("start").innerHTML =
        "<h1>💖 Now open it 😌</h1><button onclick='startSurprise()'>Open</button>";
      return;
    }

    const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    const m = Math.floor((diff%(1000*60*60))/(1000*60));
    const s = Math.floor((diff%(1000*60))/1000);

    document.getElementById("start").innerHTML =
      "<h1>🔒 Not yet Dibee 😏</h1>" +
      "<p>Come back at 00:00 💖</p>" +
      "<h2>⏳ " +
      String(h).padStart(2,'0')+":"+
      String(m).padStart(2,'0')+":"+
      String(s).padStart(2,'0') +
      "</h2>";
  },1000);
}

// Main control
function startSurprise() {
  const now = new Date().getTime();
  const unlock = new Date("April 26, 2026 00:00:00").getTime();

  if (now < unlock) {
    startPreCountdown(unlock);
    return;
  }

  document.getElementById("start").style.display = "none";
  document.getElementById("mainContent").style.display = "block";
  document.body.style.overflow = "auto";

  let music = document.getElementById("music");
  music.volume = 0;
  music.play();

  let fade = setInterval(()=>{
    if(music.volume < 1){
      music.volume += 0.05;
    } else clearInterval(fade);
  },200);

  createConfetti();
  typeEffect();
  startCountdown();
  setInterval(slideShow, 2500);
}
</script>

</body>
</html>
